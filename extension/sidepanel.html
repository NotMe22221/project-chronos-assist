<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JARVIS</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #0a0a1a; }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
  </style>
</head>
<body>
  <iframe 
    id="jarvis-frame"
    src="https://project-chronos-assist.lovable.app" 
    allow="camera *; microphone *; autoplay *; display-capture *"
    sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-popups-to-escape-sandbox allow-modals"
  ></iframe>

  <script>
    // Relay events from JARVIS iframe to extension runtime
    window.addEventListener('message', (event) => {
      if (!event.data) return;

      if (event.data.type === 'jarvis-hand-tracking') {
        chrome.runtime.sendMessage({
          action: 'hand_tracking_data',
          data: event.data,
        });
      }

      if (event.data.type === 'jarvis-browser-action') {
        chrome.runtime.sendMessage({
          action: 'browser_action',
          data: event.data,
        });
      }
    });
  </script>
</body>
</html>
